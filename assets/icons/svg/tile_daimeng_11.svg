<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="ctg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="28" fill="#FFF3E0" opacity="0.3"/>
  <!-- ears -->
  <polygon points="14,16 8,4 22,12" fill="url(#ctg)" stroke="#E65100" stroke-width="1.5"/>
  <polygon points="50,16 56,4 42,12" fill="url(#ctg)" stroke="#E65100" stroke-width="1.5"/>
  <!-- inner ears -->
  <polygon points="16,14 12,8 20,12" fill="#FFAB91"/>
  <polygon points="48,14 52,8 44,12" fill="#FFAB91"/>
  <!-- head -->
  <circle cx="32" cy="32" r="20" fill="url(#ctg)" stroke="#E65100" stroke-width="2"/>
  <!-- eyes -->
  <ellipse cx="25" cy="28" rx="3.5" ry="4" fill="white"/>
  <ellipse cx="39" cy="28" rx="3.5" ry="4" fill="white"/>
  <circle cx="26" cy="28" r="2" fill="#333"/>
  <circle cx="40" cy="28" r="2" fill="#333"/>
  <!-- nose -->
  <ellipse cx="32" cy="34" rx="2.5" ry="2" fill="#FF8A65"/>
  <!-- mouth -->
  <path d="M30 37 Q32 40 34 37" fill="none" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="16" y1="34" x2="24" y2="36" stroke="#E65100" stroke-width="1.2"/>
  <line x1="16" y1="38" x2="24" y2="38" stroke="#E65100" stroke-width="1.2"/>
  <line x1="48" y1="34" x2="40" y2="36" stroke="#E65100" stroke-width="1.2"/>
  <line x1="48" y1="38" x2="40" y2="38" stroke="#E65100" stroke-width="1.2"/>
</svg>