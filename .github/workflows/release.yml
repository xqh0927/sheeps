name: Auto Release

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            app/**/*.gradle*
            app/gradle/wrapper/gradle-wrapper.properties
            app/gradle/libs.versions.toml

      - name: Build APK
        working-directory: app
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Extract Version Name
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/app/build.gradle.kts)
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Extracted Version: $VERSION_NAME"

      - name: List APK outputs
        run: ls -la app/app/build/outputs/apk/release/

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
          TAG: v${{ env.VERSION_NAME }}
        run: |
          # 1. 检查 release 是否已存在，如果不存在则创建它
          gh release view $TAG --repo xqh0927/sheeps-releases >/dev/null 2>&1 || \
            gh release create $TAG --repo xqh0927/sheeps-releases --title "Release $TAG" --notes "自动构建发布"
          
          # 2. 强制上传，使用 --clobber 覆盖旧文件（避免因为版本冲突报错）
          gh release upload $TAG app/app/build/outputs/apk/release/*.apk --repo xqh0927/sheeps-releases --clobber
