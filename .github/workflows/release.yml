name: Auto Release
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build APK
        run: |
          cd app
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          # 关键：指定你要上传到的【目标仓库】
          repository: xqh0927/sheeps-releases
          # 关键：带上刚才配置的跨库通行证
          token: ${{ secrets.MY_PAT }}
          files: app/build/outputs/apk/release/sheeps_*.apk