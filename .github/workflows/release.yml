name: Auto Release

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            app/**/*.gradle*
            app/gradle/wrapper/gradle-wrapper.properties
            app/gradle/libs.versions.toml

      - name: Build APK
        working-directory: app
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: List APK outputs
        run: ls -la app/app/build/outputs/apk/release/

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
          TAG: v1.0.${{ github.run_number }}
        run: |
          # 1. 尝试创建 release，如果已存在则忽略错误
          gh release create $TAG --repo xqh0927/sheeps-releases --title "Release $TAG" --notes "自动构建发布" || echo "Release 已存在"
          
          # 2. 强制上传，使用 --clobber 覆盖旧文件（避免因为版本冲突报错）
          gh release upload $TAG app/build/outputs/apk/release/*.apk --repo xqh0927/sheeps-releases --clobber
